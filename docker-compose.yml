services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teacher-student-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: application
    working_dir: /app
    command: sh -c "npm run migration:run && npm run dev"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  mysql:
    image: mysql:8.0
    container_name: teacher-student-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: application
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  app_node_modules:
